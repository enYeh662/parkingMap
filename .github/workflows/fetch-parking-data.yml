name: Fetch Parking Data

on:
  schedule:
    - cron: '0 */6 * * *'   # 每 6 小時執行一次
  workflow_dispatch:          # 也可以手動觸發

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch TDX Token
        id: token
        run: |
          TOKEN=$(curl -s -X POST "https://tdx.transportdata.tw/auth/realms/TDXConnect/protocol/openid-connect/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${{ secrets.TDX_CLIENT_ID }}&client_secret=${{ secrets.TDX_CLIENT_SECRET }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Fetch Tainan Parking Data
        run: |
          curl -s -X GET \
            "https://tdx.transportdata.tw/api/basic/v1/Parking/OffStreet/CarPark/City/Tainan?\$format=JSON&\$top=1000" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -o /tmp/tainan_raw.json

      - name: Fetch Chiayi Parking Data
        run: |
          curl -s -X GET \
            "https://tdx.transportdata.tw/api/basic/v1/Parking/OffStreet/CarPark/City/Chiayi?\$format=JSON&\$top=1000" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -o /tmp/chiayi_raw.json
          curl -s -X GET \
            "https://tdx.transportdata.tw/api/basic/v1/Parking/OffStreet/CarPark/City/ChiayiCounty?\$format=JSON&\$top=1000" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -o /tmp/chiayi_county_raw.json

      - name: Convert to JS format
        run: |
          python3 << 'EOF'
          import json

          def load_json(path):
              try:
                  data = json.loads(open(path, encoding='utf-8').read())
                  # TDX 格式：{"CarParks": [...]}
                  if isinstance(data, dict) and 'CarParks' in data:
                      return data['CarParks']
                  if isinstance(data, list):
                      return data
                  return []
              except Exception as e:
                  print(f"Error loading {path}: {e}")
                  return []

          def get_str(val):
              if val is None: return ''
              if isinstance(val, dict):
                  return val.get('Zh_tw', '') or val.get('En', '') or ''
              return str(val)

          def parse_tdx(path, city_name):
              data = load_json(path)
              print(f"{city_name}: {len(data)} 筆")
              results = []
              for p in data:
                  if not isinstance(p, dict): continue
                  geo = p.get('CarParkPosition') or {}
                  lat = geo.get('PositionLat', '')
                  lng = geo.get('PositionLon', '')
                  if not lat or not lng: continue
                  fare = get_str(p.get('FareDescription', ''))
                  has_monthly = p.get('MonthlyTicketAvailable', 0) == 1
                  if has_monthly and '月租' not in fare:
                      fare = ('月租方案可洽停車場。' if not fare else fare + '月租方案可洽停車場。')
                  park_type = p.get('CarParkType', 1)
                  results.append({
                      'id': get_str(p.get('CarParkID', '')),
                      'name': get_str(p.get('CarParkName', '')),
                      'city': city_name,
                      'areaname': get_str(p.get('Address', ''))[:3],
                      'location': get_str(p.get('Address', '')),
                      'lat': str(lat),
                      'lng': str(lng),
                      'volumn': str(p.get('TotalSpaces', '') or ''),
                      'smallcarVacancy': '-2',
                      'businesshours': get_str(p.get('ServiceInfo', '')),
                      'chargeway': fare,
                      'telephone': get_str(p.get('CarParkPhone', '')),
                      'parkingLotType': '立體' if park_type in [2,3,4] else '平面',
                  })
              return results

          tainan = parse_tdx('/tmp/tainan_raw.json', '台南市')
          chiayi = parse_tdx('/tmp/chiayi_raw.json', '嘉義市')
          chiayi_c = parse_tdx('/tmp/chiayi_county_raw.json', '嘉義縣')

          # 嘉義市 + 嘉義縣合併
          chiayi_all = chiayi + chiayi_c
          print(f"台南: {len(tainan)} 筆, 嘉義: {len(chiayi_all)} 筆")

          with open('data_tainan.js', 'w', encoding='utf-8') as f:
              f.write('const PARKING_DATA_TAINAN = ')
              json.dump(tainan, f, ensure_ascii=False)
              f.write(';\n')

          with open('data_chiayi.js', 'w', encoding='utf-8') as f:
              f.write('const PARKING_DATA_CHIAYI = ')
              json.dump(chiayi_all, f, ensure_ascii=False)
              f.write(';\n')
          print("完成")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_tainan.js data_chiayi.js
          git diff --staged --quiet || git commit -m "自動更新台南/嘉義停車場資料 $(date '+%Y-%m-%d %H:%M')"
          git push
