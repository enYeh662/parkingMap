name: Fetch Parking Availability from TDX

on:
  schedule:
    - cron: '0 */1 * * *'   # 每小時執行一次（TDX 免費帳號每日 50 次，8 城市 × 24 次 = 超過，改每小時）
  workflow_dispatch:          # 手動觸發

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 取得 TDX Access Token ──────────────────────────────────────────
      - name: Fetch TDX Token
        id: token
        run: |
          TOKEN=$(curl -s -X POST \
            "https://tdx.transportdata.tw/auth/realms/TDXConnect/protocol/openid-connect/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${{ secrets.TDX_CLIENT_ID }}&client_secret=${{ secrets.TDX_CLIENT_SECRET }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      # ── 抓即時空位（4 個城市，共 4 次 API 呼叫）─────────────────────
      - name: Fetch Kaohsiung Availability
        run: |
          curl -s -X GET \
            "https://tdx.transportdata.tw/api/basic/v1/Parking/OffStreet/ParkingAvailability/City/Kaohsiung?\$format=JSON&\$top=2000" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -o /tmp/kh_avail.json
          echo "Kaohsiung: $(python3 -c "import json; d=json.load(open('/tmp/kh_avail.json')); print(len(d) if isinstance(d,list) else d.get('message','?'))")"

      - name: Fetch Tainan Availability
        run: |
          curl -s -X GET \
            "https://tdx.transportdata.tw/api/basic/v1/Parking/OffStreet/ParkingAvailability/City/Tainan?\$format=JSON&\$top=2000" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -o /tmp/tn_avail.json
          echo "Tainan: $(python3 -c "import json; d=json.load(open('/tmp/tn_avail.json')); print(len(d) if isinstance(d,list) else d.get('message','?'))")"

      - name: Fetch Chiayi Availability
        run: |
          curl -s -X GET \
            "https://tdx.transportdata.tw/api/basic/v1/Parking/OffStreet/ParkingAvailability/City/Chiayi?\$format=JSON&\$top=2000" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -o /tmp/cy_avail.json
          echo "Chiayi: $(python3 -c "import json; d=json.load(open('/tmp/cy_avail.json')); print(len(d) if isinstance(d,list) else d.get('message','?'))")"

      - name: Fetch ChiayiCounty Availability
        run: |
          curl -s -X GET \
            "https://tdx.transportdata.tw/api/basic/v1/Parking/OffStreet/ParkingAvailability/City/ChiayiCounty?\$format=JSON&\$top=2000" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -o /tmp/cyc_avail.json
          echo "ChiayiCounty: $(python3 -c "import json; d=json.load(open('/tmp/cyc_avail.json')); print(len(d) if isinstance(d,list) else d.get('message','?'))")"

      # ── Python：把即時空位 merge 進靜態 JS 檔 ────────────────────────
      - name: Merge availability into static JS files
        run: |
          python3 << 'PYEOF'
          import json, re

          def load_avail(path):
              """載入空位 JSON，回傳 {CarParkID: AvailableSpaces} dict"""
              try:
                  raw = open(path, encoding='utf-8').read().strip()
                  data = json.loads(raw)
                  # TDX v1 直接回傳 list
                  if isinstance(data, list):
                      items = data
                  elif isinstance(data, dict):
                      # 可能包在某個 key 裡
                      for key in ('ParkingAvailabilities', 'data', 'Data'):
                          if key in data:
                              items = data[key]
                              break
                      else:
                          msg = data.get('message', '')
                          print(f"  [WARN] {path}: {msg or data}")
                          return {}
                  else:
                      return {}

                  idx = {}
                  for a in items:
                      pid = a.get('CarParkID', '')
                      if not pid:
                          continue
                      spaces = a.get('AvailableSpaces', None)
                      if spaces is None:
                          spaces = a.get('CarParkAvailableSpaces', None)
                      idx[pid] = int(spaces) if spaces is not None else -2
                  print(f"  {path}: {len(idx)} 筆空位資料")
                  return idx
              except Exception as e:
                  print(f"  [ERROR] {path}: {e}")
                  return {}

          def update_js(js_path, avail_idx):
              """讀取靜態 JS 檔，更新 smallcarVacancy，寫回"""
              try:
                  raw = open(js_path, encoding='utf-8').read().strip()
                  # 提取 var NAME = [...];
                  m = re.match(r'^((?:var|const|let)\s+\w+\s*=\s*)(\[.*\])\s*;?\s*$', raw, re.DOTALL)
                  if not m:
                      print(f"  [ERROR] {js_path} 格式無法解析")
                      return 0
                  prefix = m.group(1)
                  data = json.loads(m.group(2))

                  updated = 0
                  for p in data:
                      pid = p.get('id', '')
                      if pid in avail_idx:
                          p['smallcarVacancy'] = str(avail_idx[pid])
                          updated += 1

                  with open(js_path, 'w', encoding='utf-8') as f:
                      f.write(prefix)
                      json.dump(data, f, ensure_ascii=False, separators=(',', ':'))
                      f.write(';\n')

                  print(f"  {js_path}: {updated}/{len(data)} 筆更新空位")
                  return updated
              except Exception as e:
                  print(f"  [ERROR] {js_path}: {e}")
                  return 0

          # 高雄
          print("高雄...")
          kh_idx = load_avail('/tmp/kh_avail.json')
          update_js('parking_data.js', kh_idx)

          # 台南
          print("台南...")
          tn_idx = load_avail('/tmp/tn_avail.json')
          update_js('data_tainan.js', tn_idx)

          # 嘉義（市 + 縣合併）
          print("嘉義...")
          cy_idx = load_avail('/tmp/cy_avail.json')
          cyc_idx = load_avail('/tmp/cyc_avail.json')
          cy_all = {**cy_idx, **cyc_idx}
          update_js('data_chiayi.js', cy_all)

          print("完成！")
          PYEOF

      # ── Commit & Push ─────────────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add parking_data.js data_tainan.js data_chiayi.js
          git diff --staged --quiet || git commit -m "chore: 更新即時停車空位 $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
