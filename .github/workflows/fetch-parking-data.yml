name: Fetch Parking Data

on:
  schedule:
    - cron: '0 */6 * * *'   # 每 6 小時執行一次
  workflow_dispatch:          # 也可以手動觸發

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch TDX Token
        id: token
        run: |
          TOKEN=$(curl -s -X POST "https://tdx.transportdata.tw/auth/realms/TDXConnect/protocol/openid-connect/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${{ secrets.TDX_CLIENT_ID }}&client_secret=${{ secrets.TDX_CLIENT_SECRET }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Fetch Tainan Parking Data
        run: |
          curl -s -X GET \
            "https://tdx.transportdata.tw/api/basic/v1/Parking/OffStreet/CarPark/City/Tainan?\$format=JSON&\$top=1000" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -o /tmp/tainan_raw.json

      - name: Fetch Chiayi Parking Data
        run: |
          curl -s -X GET \
            "https://tdx.transportdata.tw/api/basic/v1/Parking/OffStreet/CarPark/City/Chiayi?\$format=JSON&\$top=1000" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -o /tmp/chiayi_raw.json
          curl -s -X GET \
            "https://tdx.transportdata.tw/api/basic/v1/Parking/OffStreet/CarPark/City/ChiayiCounty?\$format=JSON&\$top=1000" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -o /tmp/chiayi_county_raw.json

      - name: Inspect raw data structure
        run: |
          python3 -c "
          import json
          raw = open('/tmp/tainan_raw.json', encoding='utf-8').read()
          print('Raw preview:', raw[:500])
          try:
              data = json.loads(raw)
              print('Type:', type(data).__name__)
              if isinstance(data, list):
                  print('List length:', len(data))
                  if data:
                      print('First item keys:', list(data[0].keys()) if isinstance(data[0], dict) else type(data[0]).__name__)
                      print('Sample:', json.dumps(data[0], ensure_ascii=False)[:400])
              elif isinstance(data, dict):
                  print('Dict keys:', list(data.keys()))
          except Exception as e:
              print('Parse error:', e)
          "

      - name: Convert to JS format
        run: |
          python3 << 'EOF'
          import json

          def load_json(path):
              try:
                  raw = open(path, encoding='utf-8').read()
                  data = json.loads(raw)
                  # 處理各種包裝格式
                  if isinstance(data, list):
                      return data
                  if isinstance(data, dict):
                      for key in ['CarParks', 'data', 'Data', 'result', 'Result']:
                          if key in data and isinstance(data[key], list):
                              return data[key]
                      # 找第一個 list 值
                      for v in data.values():
                          if isinstance(v, list):
                              return v
                  return []
              except Exception as e:
                  print(f"Error loading {path}: {e}")
                  return []

          def get_str(val):
              if val is None:
                  return ''
              if isinstance(val, dict):
                  return val.get('Zh_tw', '') or val.get('En', '') or str(list(val.values())[0]) if val else ''
              return str(val)

          def parse_tdx(path, city_name):
              data = load_json(path)
              print(f"{city_name}: loaded {len(data)} records")
              results = []
              for p in data:
                  if not isinstance(p, dict):
                      continue
                  geo = p.get('CarParkPosition') or {}
                  if not isinstance(geo, dict):
                      geo = {}
                  lat = geo.get('PositionLat') or ''
                  lng = geo.get('PositionLon') or ''
                  if not lat or not lng:
                      continue
                  fare = get_str(p.get('FareInfo', ''))
                  name = get_str(p.get('CarParkName', ''))
                  addr = get_str(p.get('CarParkAddress', ''))
                  results.append({
                      'id': get_str(p.get('CarParkID', '')),
                      'name': name,
                      'city': city_name,
                      'areaname': get_str(p.get('AreaName', '')),
                      'location': addr,
                      'lat': str(lat),
                      'lng': str(lng),
                      'volumn': str(p.get('TotalSpaces', '') or ''),
                      'smallcarVacancy': str(p.get('AvailableSpaces', -2) if p.get('AvailableSpaces') is not None else -2),
                      'businesshours': get_str(p.get('ServiceInfo', '')),
                      'chargeway': fare,
                      'telephone': get_str(p.get('CarParkPhone', '')),
                      'parkingLotType': '立體' if p.get('CarParkType', 0) in [2,3,4] else '平面',
                  })
              return results

          tainan = parse_tdx('/tmp/tainan_raw.json', '台南市')
          chiayi = parse_tdx('/tmp/chiayi_raw.json', '嘉義市')
          chiayi_c = parse_tdx('/tmp/chiayi_county_raw.json', '嘉義縣')

          all_data = tainan + chiayi + chiayi_c
          print(f"合計: {len(all_data)} 筆")

          with open('data_tainan_chiayi.js', 'w', encoding='utf-8') as f:
              f.write('const PARKING_DATA_TAINAN_CHIAYI = ')
              json.dump(all_data, f, ensure_ascii=False)
              f.write(';\n')
          print("寫入 data_tainan_chiayi.js 完成")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_tainan_chiayi.js
          git diff --staged --quiet || git commit -m "自動更新台南/嘉義停車場資料 $(date '+%Y-%m-%d %H:%M')"
          git push
