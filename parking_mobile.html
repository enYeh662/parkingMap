<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>停車場查詢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{--pri:#2563eb;--pri-l:#eff6ff;--org:#ea580c;--org-l:#fff7ed;--grn:#16a34a;--grn-l:#dcfce7;--red:#dc2626;--g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;--g400:#9ca3af;--g500:#6b7280;--g600:#4b5563;--g700:#374151;--g800:#1f2937;--g900:#111827;--r:12px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',-apple-system,'PingFang TC',sans-serif;background:var(--g50);color:var(--g800);overflow-x:hidden;-webkit-font-smoothing:antialiased}
.top{position:sticky;top:0;z-index:100;background:var(--g900);padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top))}
.top-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.logo{font-size:1.1rem;font-weight:700;color:#fff;white-space:nowrap}
.logo span{font-weight:300;color:var(--pri)}
.top-count{font-size:.65rem;color:var(--g400);margin-left:auto;white-space:nowrap}
.search-wrap{position:relative}
.search-input{width:100%;padding:10px 14px 10px 36px;border:none;border-radius:10px;font-size:.9rem;outline:none;font-family:inherit;background:var(--g800);color:#fff}
.search-input::placeholder{color:var(--g500)}
.search-input:focus{background:var(--g700);box-shadow:0 0 0 2px rgba(37,99,235,.4)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;opacity:.4}
.filter-bar{position:sticky;top:0;z-index:99;background:#fff;border-bottom:1px solid var(--g100)}
.filter-scroll{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-scroll::-webkit-scrollbar{display:none}
.chip{padding:5px 14px;border-radius:20px;border:1.5px solid var(--g200);background:#fff;cursor:pointer;font-size:.76rem;font-family:inherit;white-space:nowrap;color:var(--g600);flex-shrink:0;transition:all .15s}
.chip.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.chip-price{border-color:var(--org);color:var(--org)}
.chip-price.on{background:var(--org);color:#fff;border-color:var(--org)}
.results-bar{padding:8px 16px;font-size:.72rem;color:var(--g400);display:flex;justify-content:space-between;align-items:center;background:var(--g50);border-bottom:1px solid var(--g100)}
.results-bar select{padding:3px 6px;border:1px solid var(--g200);border-radius:6px;font-size:.72rem;font-family:inherit;outline:none;background:#fff}
.loc-bar{padding:8px 16px;font-size:.72rem;background:#f0fdf4;border-bottom:1px solid #bbf7d0;color:#15803d;display:none;align-items:center;gap:6px}
.loc-bar.show{display:flex}
.loc-bar-err{background:#fef2f2;border-bottom-color:#fecaca;color:#dc2626}
.chip-near{border-color:#15803d;color:#15803d}
.chip-near.on{background:#15803d;color:#fff;border-color:#15803d}
.dist-tag{font-size:.6rem;color:var(--g400);margin-left:4px}
.list{padding-bottom:env(safe-area-inset-bottom)}
.card{margin:8px 12px;background:#fff;border-radius:var(--r);box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden;transition:all .15s;border:1.5px solid transparent}
.card.on{border-color:var(--pri);box-shadow:0 2px 8px rgba(37,99,235,.15)}
.card-body{padding:14px 16px}
.card-row1{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.card-name{font-size:.92rem;font-weight:600;color:var(--g900);line-height:1.3}
.badges{display:flex;gap:4px;flex-shrink:0}
.bdg{font-size:.58rem;padding:2px 7px;border-radius:6px;font-weight:600}
.bdg-t{background:var(--pri-l);color:var(--pri)}
.bdg-m{background:var(--org-l);color:var(--org)}
.card-meta{display:flex;flex-wrap:wrap;gap:4px 10px;font-size:.72rem;color:var(--g500);margin-bottom:8px}
.card-price{font-size:.7rem;line-height:1.5;color:var(--g500);padding:8px 10px;background:var(--g50);border-radius:8px}
.card-price .hl{color:var(--org);font-weight:600}
.card-actions{display:flex;border-top:1px solid var(--g100)}
.card-btn{flex:1;padding:10px;text-align:center;font-size:.78rem;font-family:inherit;border:none;background:none;cursor:pointer;color:var(--pri);font-weight:500;transition:background .1s}
.card-btn:first-child{border-right:1px solid var(--g100)}
.card-btn:active{background:var(--pri-l)}
.vac{font-size:.62rem;font-weight:600;padding:1px 5px;border-radius:5px}
.vg{background:var(--grn-l);color:var(--grn)}.vr{background:#fef2f2;color:var(--red)}.vy{background:var(--g100);color:var(--g400)}
.nores{text-align:center;padding:60px 20px;color:var(--g400)}
.nores-icon{font-size:2.5rem;margin-bottom:10px}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.sheet-overlay.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:201;background:#fff;border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:80vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom)}
.sheet.show{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--g300);border-radius:2px;margin:10px auto 0}
.sheet-header{padding:12px 16px 6px;display:flex;justify-content:space-between;align-items:flex-start}
.sheet-name{font-size:1rem;font-weight:600;color:var(--g900);line-height:1.3;flex:1}
.sheet-close{width:28px;height:28px;border-radius:50%;border:none;background:var(--g100);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:8px}
.sheet-info{padding:0 16px 10px;font-size:.78rem;color:var(--g500);line-height:1.7}
.sheet-info .hl{color:var(--org);font-weight:600}
.sheet-map{height:220px;position:relative}
#minimap{width:100%;height:100%}
.sheet-footer{display:flex;border-top:1px solid var(--g100)}
.sheet-btn{flex:1;padding:14px;text-align:center;font-size:.88rem;font-family:inherit;border:none;background:none;cursor:pointer;font-weight:600}
.sheet-btn-nav{color:var(--pri)}
.sheet-btn-nav:active{background:var(--pri-l)}
.sheet-btn:first-child{border-right:1px solid var(--g100);color:var(--g500)}
.pm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;opacity:0;pointer-events:none;transition:opacity .2s}
.pm-overlay.show{opacity:1;pointer-events:auto}
.pm{position:fixed;bottom:0;left:0;right:0;z-index:301;background:#fff;border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);padding:20px 20px calc(20px + env(safe-area-inset-bottom));max-height:80vh;overflow-y:auto}
.pm.show{transform:translateY(0)}
.pm-title{font-size:1rem;font-weight:600;margin-bottom:16px;text-align:center}
.pm-group{margin-bottom:16px}
.pm-label{font-size:.78rem;color:var(--g500);margin-bottom:6px}
.pm-opts{display:flex;flex-wrap:wrap;gap:6px}
.pm-opt{padding:8px 16px;border-radius:10px;border:1.5px solid var(--g200);background:#fff;font-size:.82rem;font-family:inherit;cursor:pointer;color:var(--g600)}
.pm-opt.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.pm-done{width:100%;padding:14px;border:none;border-radius:12px;background:var(--g900);color:#fff;font-size:.92rem;font-family:inherit;font-weight:600;cursor:pointer;margin-top:8px}
.chip-monthly{border-color:#7c3aed;color:#7c3aed}
.chip-monthly.on{background:#7c3aed;color:#fff;border-color:#7c3aed}
.chip-dist{border-color:#0891b2;color:#0891b2}
.chip-dist.on{background:#0891b2;color:#fff;border-color:#0891b2}
.city-tabs{display:flex;background:var(--g800);padding:0 16px;gap:4px;overflow-x:auto;scrollbar-width:none}
.city-tabs::-webkit-scrollbar{display:none}
.city-tab{padding:8px 16px;font-size:.78rem;font-family:inherit;border:none;background:none;color:var(--g400);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s}
.city-tab.on{color:#fff;border-bottom-color:var(--pri)}
.loading-bar{padding:12px 16px;text-align:center;font-size:.78rem;color:var(--g400);background:var(--g50)}
</style>
</head>
<body>
<div class="top">
<div class="top-row"><div class="logo">&#x1F17F;&#xFE0F; <span id="cityLabel">停車場</span></div><div class="top-count"><span id="tc">0</span> 座</div></div>
<div class="search-wrap">
<svg class="search-icon" viewBox="0 0 16 16" fill="#9ca3af"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85zm-5.242.656a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/></svg>
<input type="text" class="search-input" id="si" placeholder="搜尋名稱、地址..." aria-label="搜尋">
</div>
<div class="city-tabs" id="cityTabs">
<button class="city-tab on" data-city="kaohsiung">高雄市</button>
<button class="city-tab" data-city="tainan">台南市</button>
<button class="city-tab" data-city="chiayi">嘉義</button>
</div>
</div>
<div class="filter-bar"><div class="filter-scroll" id="filterScroll"></div></div>
<div class="results-bar"><span id="rc">0 筆</span><select id="sortSel"><option value="dist">距離近→遠</option><option value="name">名稱</option><option value="vd">車位多→少</option><option value="pd">月租低→高</option><option value="area">行政區</option></select></div>
<div class="loc-bar" id="locBar">📍 <span id="locMsg">正在取得位置...</span></div>
<div class="list" id="lst"></div>
<div class="sheet-overlay" id="sheetBg"></div>
<div class="sheet" id="sheet">
<div class="sheet-handle"></div>
<div class="sheet-header"><div class="sheet-name" id="sheetName"></div><button class="sheet-close" id="sheetClose">&#x2715;</button></div>
<div class="sheet-info" id="sheetInfo"></div>
<div class="sheet-map"><div id="minimap"></div></div>
<div class="sheet-footer"><button class="sheet-btn" id="sheetCloseBtn">關閉</button><button class="sheet-btn sheet-btn-nav" id="sheetNav">&#x1F9ED; 導航前往</button></div>
</div>
<!-- 類型 sheet -->
<div class="pm-overlay" id="typeBg"></div>
<div class="pm" id="typePm">
<div class="pm-title">🏢 停車場類型</div>
<div class="pm-group">
<div class="pm-opts" id="typeOpts">
<button class="pm-opt on" data-v="all">全部</button>
<button class="pm-opt" data-v="平面">平面</button>
<button class="pm-opt" data-v="立體">立體</button>
</div>
</div>
<button class="pm-done" id="typeDone">套用篩選</button>
</div>

<!-- 計時費率 sheet -->
<div class="pm-overlay" id="pmBg"></div>
<div class="pm" id="pm">
<div class="pm-title">⏱ 計時費率篩選</div>
<div class="pm-group"><div class="pm-label">每半小時費率上限</div>
<div class="pm-opts" id="pmHalf">
<button class="pm-opt on" data-v="">不限</button><button class="pm-opt" data-v="10">&#x2264;10元</button><button class="pm-opt" data-v="15">&#x2264;15元</button><button class="pm-opt" data-v="20">&#x2264;20元</button><button class="pm-opt" data-v="30">&#x2264;30元</button><button class="pm-opt" data-v="50">&#x2264;50元</button>
</div></div>
<button class="pm-done" id="pmDone">套用篩選</button>
</div>

<!-- 月租 sheet -->
<div class="pm-overlay" id="mmBg"></div>
<div class="pm" id="mm">
<div class="pm-title">&#x1F3E0; 月租篩選</div>
<div class="pm-group"><div class="pm-label">顯示範圍</div>
<div class="pm-opts" id="mmHasOpts">
<button class="pm-opt on" data-v="">全部停車場</button><button class="pm-opt" data-v="only">只看有月租</button>
</div></div>
<div class="pm-group"><div class="pm-label">月租費用上限</div>
<div class="pm-opts" id="mmMonth">
<button class="pm-opt on" data-v="">不限</button><button class="pm-opt" data-v="1000">&#x2264;1千</button><button class="pm-opt" data-v="1500">&#x2264;1.5千</button><button class="pm-opt" data-v="2000">&#x2264;2千</button><button class="pm-opt" data-v="3000">&#x2264;3千</button><button class="pm-opt" data-v="5000">&#x2264;5千</button>
</div></div>
<button class="pm-done" id="mmDone">套用篩選</button>
</div>

<!-- 行政區 sheet -->
<div class="pm-overlay" id="distBg"></div>
<div class="pm" id="distPm">
<div class="pm-title">&#x1F4CD; 選擇行政區</div>
<div class="pm-group">
<div class="pm-opts" id="distOpts"></div>
</div>
<button class="pm-done" id="distDone">套用篩選</button>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="parking_data.js"></script>
<script>
// 縣市設定
var CITIES={
  kaohsiung:{label:'高雄市', varName:'PARKING_DATA', file:null},
  tainan:   {label:'台南市', varName:'PARKING_DATA_TAINAN', file:'data_tainan.js'},
  chiayi:   {label:'嘉義',   varName:'PARKING_DATA_CHIAYI', file:'data_chiayi.js'}
};
var loadedCities={kaohsiung:true};
var currentCity='kaohsiung';

(function(){
var D=PARKING_DATA,cDist='all',cType='all',cS='',cSort='name',cPH='',cPM='',cMonthOnly=false,cNear=false;
var userLat=null,userLng=null;

function parseData(arr){
  arr.forEach(function(p){
    var w=p.chargeway||'';
    var m=w.match(/每半小時(\d+)元/);p._hh=m?+m[1]:null;
    var mm=w.match(/(?:每月|月租[：:]?)\s*([\d,]+)\s*元/);
    if(!mm)mm=w.match(/計月[收費：:]*(?:每月)?\s*([\d,]+)\s*元/);
    p._mo=mm?+mm[1].replace(/,/g,''):null;
    p._hm=/月租|計月|每月/.test(w);
  });
}
parseData(D);

// 縣市切換
document.getElementById('cityTabs').onclick=function(e){
  var t=e.target.closest('.city-tab');if(!t)return;
  var city=t.dataset.city;if(city===currentCity)return;
  document.querySelectorAll('.city-tab').forEach(function(x){x.classList.remove('on')});
  t.classList.add('on');
  currentCity=city;
  document.getElementById('cityLabel').textContent=CITIES[city].label;
  // 重置篩選
  cDist='all';cType='all';cS='';cPH='';cPM='';cMonthOnly=false;cNear=false;
  document.getElementById('si').value='';
  resetChips();
  if(loadedCities[city]){
    D=window[CITIES[city].varName]||[];
    parseData(D);
    rebuildDist();
    document.getElementById('tc').textContent=D.length;
    render();
  } else {
    document.getElementById('lst').innerHTML='<div class="loading-bar">載入中...</div>';
    var s=document.createElement('script');
    s.src=CITIES[city].file;
    s.onload=function(){
      loadedCities[city]=true;
      D=window[CITIES[city].varName]||[];
      parseData(D);
      rebuildDist();
      document.getElementById('tc').textContent=D.length;
      render();
    };
    s.onerror=function(){
      document.getElementById('lst').innerHTML='<div class="nores"><div class="nores-icon">⚠️</div><div>資料載入失敗</div></div>';
    };
    document.head.appendChild(s);
  }
};

function resetChips(){
  var nc=document.getElementById('nearChip');if(nc)nc.classList.remove('on');
  var pc=document.getElementById('priceChip');if(pc){pc.classList.remove('on');pc.textContent='⏱ 計時費率';}
  var dc=document.getElementById('distChip');if(dc){dc.classList.remove('on');dc.textContent='🗺 行政區';}
  var mc=document.getElementById('monthlyChip');if(mc){mc.classList.remove('on');mc.textContent='🏠 月租';}
  var tc=document.getElementById('typeChip');if(tc){tc.classList.remove('on');tc.textContent='🏢 類型';}
  document.querySelectorAll('#pmHalf .pm-opt').forEach(function(x){x.classList.remove('on')});
  document.querySelector('#pmHalf .pm-opt[data-v=""]').classList.add('on');
  document.querySelectorAll('#mmHasOpts .pm-opt').forEach(function(x){x.classList.remove('on')});
  document.querySelector('#mmHasOpts .pm-opt[data-v=""]').classList.add('on');
  document.querySelectorAll('#mmMonth .pm-opt').forEach(function(x){x.classList.remove('on')});
  document.querySelector('#mmMonth .pm-opt[data-v=""]').classList.add('on');
  document.querySelectorAll('#typeOpts .pm-opt').forEach(function(x){x.classList.remove('on')});
  document.querySelector('#typeOpts .pm-opt[data-v="all"]').classList.add('on');
}

function rebuildDist(){
  var dN={};D.forEach(function(p){dN[p.areaname]=(dN[p.areaname]||0)+1});
  var sD=Object.entries(dN).sort(function(a,b){return b[1]-a[1]});
  var html='<button class="pm-opt on" data-d="all">全部</button>';
  sD.forEach(function(x){html+='<button class="pm-opt" data-d="'+x[0]+'">'+x[0]+'<span style="font-size:.65rem;opacity:.6;margin-left:3px">'+x[1]+'</span></button>'});
  document.getElementById('distOpts').innerHTML=html;
}
rebuildDist();
document.getElementById('tc').textContent=D.length;

// Filter bar
var fs=document.getElementById('filterScroll');
fs.innerHTML=
  '<button class="chip chip-near" id="nearChip" data-action="near">📍 附近1km</button>'+
  '<button class="chip chip-price" id="priceChip" data-action="price">⏱ 計時費率</button>'+
  '<button class="chip chip-dist" id="distChip" data-action="dist">🗺 行政區</button>'+
  '<button class="chip chip-monthly" id="monthlyChip" data-action="monthly">🏠 月租</button>'+
  '<button class="chip chip-type" id="typeChip" data-action="type">🏢 類型</button>';

fs.onclick=function(e){
  var c=e.target.closest('.chip');if(!c)return;
  if(c.dataset.action==='price'){openPM();return}
  if(c.dataset.action==='monthly'){openMM();return}
  if(c.dataset.action==='dist'){openDist();return}
  if(c.dataset.action==='type'){openType();return}
  if(c.dataset.action==='near'){cNear=!cNear;c.classList.toggle('on',cNear);render();return;}
};

function calcDist(lat1,lng1,lat2,lng2){
  var R=6371000,r=Math.PI/180,dLat=(lat2-lat1)*r,dLng=(lng2-lng1)*r;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtDist(m){return m<1000?Math.round(m)+'m':(m/1000).toFixed(1)+'km'}

function initGeo(){
  if(!navigator.geolocation)return;
  var lb=document.getElementById('locBar'),lm=document.getElementById('locMsg');
  lb.classList.add('show');
  navigator.geolocation.getCurrentPosition(
    function(pos){
      userLat=pos.coords.latitude;userLng=pos.coords.longitude;
      D.forEach(function(p){p._dist=calcDist(userLat,userLng,+p.lat,+p.lng)});
      document.getElementById('sortSel').value='dist';cSort='dist';
      cNear=true;var nc=document.getElementById('nearChip');if(nc)nc.classList.add('on');
      lm.textContent='已取得位置，顯示附近停車場';
      setTimeout(function(){lb.classList.remove('show')},3000);
      render();
    },
    function(){
      lm.textContent='無法取得位置，顯示全部停車場';
      lb.classList.add('loc-bar-err');
      setTimeout(function(){lb.classList.remove('show')},4000);
    },
    {timeout:10000,maximumAge:60000}
  );
}

document.getElementById('si').oninput=function(e){cS=e.target.value.trim().toLowerCase();render()};
document.getElementById('sortSel').onchange=function(e){cSort=e.target.value;render()};

function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function hlM(t){if(!t)return'';return t.replace(/(月租[^。；;]*[。；;]?|計月[^。；;]*[。；;]?|每月[^。；;]*[。；;]?)/g,'<span class="hl">$1</span>')}
function vB(v){var n=parseInt(v);if(isNaN(n)||n<0)return'<span class="vac vy">依現場</span>';if(n===0)return'<span class="vac vr">已滿</span>';return'<span class="vac vg">剩'+n+'</span>'}

function render(){
  var mH=cPH?+cPH:0,mM=cPM?+cPM:0;
  var fd=D.filter(function(p){
    if(cNear&&(p._dist===undefined||p._dist>1000))return false;
    if(cDist!=='all'&&p.areaname!==cDist)return false;
    if(cType==='平面'&&p.parkingLotType!=='平面')return false;
    if(cType==='立體'&&p.parkingLotType!=='立體')return false;
    if(cMonthOnly&&!p._hm)return false;
    if(mH&&(p._hh===null||p._hh>mH))return false;
    if(mM&&(p._mo===null||p._mo>mM))return false;
    if(cS){if(!((p.name||'').toLowerCase().indexOf(cS)>=0||(p.location||'').toLowerCase().indexOf(cS)>=0||(p.areaname||'').toLowerCase().indexOf(cS)>=0))return false}
    return true;
  });
  fd.sort(function(a,b){
    if(cSort==='dist'){var ad=a._dist!==undefined?a._dist:999999,bd=b._dist!==undefined?b._dist:999999;return ad-bd;}
    if(cSort==='name')return(a.name||'').localeCompare(b.name||'');
    if(cSort==='vd')return(+b.volumn||0)-(+a.volumn||0);
    if(cSort==='pd')return(a._mo||99999)-(b._mo||99999);
    if(cSort==='area')return(a.areaname||'').localeCompare(b.areaname||'');
    return 0;
  });
  document.getElementById('rc').textContent=fd.length+' 筆';
  var ls=document.getElementById('lst');
  if(!fd.length){ls.innerHTML='<div class="nores"><div class="nores-icon">&#x1F50D;</div><div>找不到符合條件的停車場</div></div>';return}
  var lim=200,ts=fd.slice(0,lim);
  ls.innerHTML=ts.map(function(p){
    var bg='<span class="bdg bdg-t">'+(p.parkingLotType||'—')+'</span>';
    if(p._hm)bg+='<span class="bdg bdg-m">月租</span>';
    var mt='<span>&#x1F4CD; '+esc(p.areaname)+'</span>';
    if(p._dist!==undefined)mt+='<span style="color:var(--grn);font-weight:600">'+fmtDist(p._dist)+'</span>';
    mt+='<span>&#x1F697; '+(+p.volumn||'—')+'格 '+vB(p.smallcarVacancy)+'</span>';
    if(p._hh)mt+='<span>&#x23F1; '+p._hh+'元/半hr</span>';
    if(p._mo)mt+='<span style="color:var(--org);font-weight:600">&#x1F4B0; 月租'+p._mo.toLocaleString()+'元</span>';
    return'<div class="card" data-id="'+p.id+'"><div class="card-body" onclick="openSheet(\''+p.id+'\')"><div class="card-row1"><div class="card-name">'+esc(p.name)+'</div><div class="badges">'+bg+'</div></div><div class="card-meta">'+mt+'</div><div class="card-price">'+hlM(esc(p.chargeway)||'費率未提供')+'</div></div><div class="card-actions"><button class="card-btn" onclick="openSheet(\''+p.id+'\')">&#x1F4CD; 查看地圖</button><a class="card-btn" href="https://www.google.com/maps/dir/?api=1&destination='+p.lat+','+p.lng+'" target="_blank" rel="noopener" style="text-decoration:none;color:var(--pri)">&#x1F9ED; 導航</a></div></div>';
  }).join('')+(fd.length>lim?'<div style="text-align:center;padding:20px;color:var(--g400);font-size:.78rem">還有'+(fd.length-lim)+'筆，請搜尋篩選</div>':'');
}

  if(cPH){pc.classList.add('on');pc.textContent='⏱ ≤'+cPH+'元/半hr';}else{pc.classList.remove('on');pc.textContent='⏱ 計時費率';}

}
document.getElementById('pmBg').onclick=closePM;
document.getElementById('pmDone').onclick=closePM;
document.getElementById('pmHalf').onclick=function(e){var o=e.target.closest('.pm-opt');if(!o)return;document.querySelectorAll('#pmHalf .pm-opt').forEach(function(x){x.classList.remove('on')});o.classList.add('on');cPH=o.dataset.v};

document.getElementById('mmBg').onclick=closeMM;
document.getElementById('mmDone').onclick=closeMM;
document.getElementById('mmHasOpts').onclick=function(e){var o=e.target.closest('.pm-opt');if(!o)return;document.querySelectorAll('#mmHasOpts .pm-opt').forEach(function(x){x.classList.remove('on')});o.classList.add('on');cMonthOnly=(o.dataset.v==='only')};

function openDist(){document.getElementById('distBg').classList.add('show');document.getElementById('distPm').classList.add('show')}

var minimap=null,miniMarker=null;
window.openSheet=function(id){
  var p=D.find(function(x){return x.id===id});if(!p)return;
  document.querySelectorAll('.card').forEach(function(c){c.classList.remove('on')});
  var el=document.querySelector('.card[data-id="'+id+'"]');if(el)el.classList.add('on');
  document.getElementById('sheetName').textContent=p.name;
  var info='<div>&#x1F4CD; '+esc(p.areaname)+' — '+esc(p.location)+'</div>';
  info+='<div>&#x1F697; 車位：'+(p.volumn||'—')+' 格 ｜ '+(p.parkingLotType||'')+'</div>';
  info+='<div>&#x1F550; '+(esc(p.businesshours)||'—')+'</div>';
  if(p.telephone)info+='<div>&#x1F4DE; '+esc(p.telephone)+'</div>';
  var cw=p.chargeway?p.chargeway.replace(/(月租[^。；;]*[。；;]?|計月[^。；;]*[。；;]?|每月[^。；;]*[。；;]?)/g,'<span class="hl">$1</span>'):'費率未提供';
  info+='<div style="margin-top:6px;padding:8px;background:var(--g50);border-radius:8px;font-size:.74rem">'+cw+'</div>';
  document.getElementById('sheetInfo').innerHTML=info;
  document.getElementById('sheetNav').onclick=function(){window.open('https://www.google.com/maps/dir/?api=1&destination='+p.lat+','+p.lng,'_blank')};
  document.getElementById('sheetBg').classList.add('show');
  document.getElementById('sheet').classList.add('show');
  setTimeout(function(){
    var la=+p.lat,lo=+p.lng;
    if(!minimap){minimap=L.map('minimap',{zoomControl:false,attributionControl:false}).setView([la,lo],16);L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(minimap);}
    else{minimap.setView([la,lo],16);minimap.invalidateSize();}
    if(miniMarker)minimap.removeLayer(miniMarker);
    miniMarker=L.marker([la,lo]).addTo(minimap);
    miniMarker.bindPopup('<b>'+esc(p.name)+'</b>').openPopup();
    setTimeout(function(){minimap.invalidateSize()},100);
  },150);
};
window.closeSheet=function(){document.getElementById('sheetBg').classList.remove('show');document.getElementById('sheet').classList.remove('show');document.querySelectorAll('.card').forEach(function(c){c.classList.remove('on')})};
document.getElementById('sheetBg').onclick=closeSheet;
document.getElementById('sheetClose').onclick=closeSheet;
document.getElementById('sheetCloseBtn').onclick=closeSheet;

render();
initGeo();
})();
</script>
